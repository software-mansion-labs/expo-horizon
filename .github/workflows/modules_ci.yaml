name: Modules CI

on:
  pull_request:
    paths:
      - 'expo-horizon-core/**'
      - 'expo-horizon-location/**'
      - 'expo-horizon-notifications/**'
      - '.github/workflows/modules_ci.yml'

      # --- Shared paths for BOTH workflows ---
      - 'package.json'
      - 'yarn.lock'
      - '.eslintrc.js'
      - '.prettierrc.json'
      - 'tsconfig.base.json'
  push:
    branches:
      - main
    paths:
      - 'expo-horizon-core/**'
      - 'expo-horizon-location/**'
      - 'expo-horizon-notifications/**'
      - '.github/workflows/modules_ci.yml'

      # --- Shared paths for BOTH workflows ---
      - 'package.json'
      - 'yarn.lock'
      - '.eslintrc.js'
      - '.prettierrc.json'
      - 'tsconfig.base.json'

jobs:
  quality-checks:
    name: Libs Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 📦 Install Yarn
        run: npm install -g yarn

      - name: 🌿 Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - name: 📦 Install all dependencies
        run: yarn install --frozen-lockfile

      - name: 🤓 Run ESLint
        run: |
          yarn eslint expo-horizon-core/ \
                      expo-horizon-location/ \
                      expo-horizon-notifications/ \
                      --ext .js,.jsx,.ts,.tsx

      - name: ✨ Run Prettier check
        run: |
          yarn prettier --check expo-horizon-core/ \
                                expo-horizon-location/ \
                                expo-horizon-notifications/

      - name: 🔍 Run TypeScript check
        run: |
          yarn tsc --project expo-horizon-core/tsconfig.json --noEmit
          yarn tsc --project expo-horizon-location/tsconfig.json --noEmit
          yarn tsc --project expo-horizon-notifications/tsconfig.json --noEmit
