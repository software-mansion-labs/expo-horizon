name: Publish Package to NPM

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        options: 
          - expo-horizon-core
          - expo-horizon-location
          - expo-horizon-notifications
        required: true
        default: expo-horizon-core
      release-type:
        type: choice
        options: [stable, nightly, rc]
        default: nightly
      version:
        description: 'Explicit version in x.y.z format (leave empty to infer).'
        type: string
        required: false
        default: ''
      dry-run:
        description: 'Dry run — no actual publish or git push.'
        type: boolean
        default: true

jobs:
  publish:
    name: Publish ${{ inputs.package }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    concurrency:
      group: publish-${{ inputs.package }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: 🏗 Check out
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org/'

      - name: 📦 Install dependencies
        if: ${{ inputs.package == 'expo-horizon-notifications' }}
        run: yarn install --immutable

      - name: 🔨 Build expo-horizon-core
        if: ${{ inputs.package == 'expo-horizon-notifications' }}
        run: yarn workspace expo-horizon-core build

      - name: 🚀 Publish ${{ inputs.package }}
        uses: software-mansion/npm-package-publish@22b6e632b4310c5c061a047bccc99d0cea88d2bb
        with:
          package-name: ${{ inputs.package }}
          package-json-path: '${{ inputs.package }}/package.json'
          install-dependencies-command: 'yarn install --immutable'
          release-type: ${{ inputs.release-type }}
          version: ${{ inputs.version }}
          dry-run: ${{ inputs.dry-run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}